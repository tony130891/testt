<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holy grail</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Single:wght@100..900&family=Playwrite+GB+J+Guides:ital@0;1&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <title>Grid</title>
</head>
<body>
   
    <div class="container">
        <div class="header">
            <div class="header-search">
                <p><a href="">City of carms</a></p>
                <p><a href="">My Account</a></p>
                <label for="search-bar">
                    <input type="search" name="search" id="search-bar" placeholder="Search">
                </label>
            </div>
            <div class="header-nav">
                <h3>Restoration Project</h3>
                <h3>Kids and Teens</h3>
                <h3>Library services</h3>
                <h3>Local History</h3>
                <h3>Research Online</h3>
                <h3>Stream and download</h3>
                <h3>Support the library</h3>
                <h3>Contact us</h3>
            </div>
        </div>
        <div class="main-content">
            <div class="library">
                <button class="btn-add">Add Book to Library</button>
                <dialog id="Dialog">
                    <form action="POST" method="dialog" id="formDialog">
                        <label for="title">Title</label>
                        <input type="text" name="title" id="title">
                        <label for="author">Author</label>
                        <input type="text" id="author">
                        <label for="pages">Pages</label>
                        <input type="number" id="pages">
                        <label for="read">Read</label>
                        <input type="checkbox" id="read" checked>
                        <div>
                            <button type="submit" value="confirm" id="confirm-btn">Submit</button>
                            <button id="closeDialog">Close</button>
                        </div>
                    </form>
                </dialog>
            </div>
            <div class="card-container">
            </div>
    </div>

</body>
<script src="js.js"></script>
</html>
